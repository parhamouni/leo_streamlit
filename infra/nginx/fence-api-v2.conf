# /etc/nginx/sites-available/fence-api-v2.conf
# TLS-terminating reverse proxy for `api.<your-domain>` → uvicorn on 8513.
#
# Long timeouts because:
#   - `/api/jobs/{id}/progress` is an SSE stream (kept open for the
#     duration of the job — minutes for large PDFs).
#   - `/api/jobs/{id}/measurement-pdf` and `/measurement-summary`
#     re-extract vector lines server-side and can take 30-60s on
#     dense documents.
# Tune `client_max_body_size` to your largest expected upload.

upstream fence_api_v2 {
    server 127.0.0.1:8513;
    keepalive 16;
}

# Plain HTTP → 301 to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name api.<your-domain>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.<your-domain>;

    # certbot will fill these in.
    ssl_certificate     /etc/letsencrypt/live/api.<your-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.<your-domain>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Sized for typical fence-drawing PDFs. Bump if your customer PDFs
    # are larger; api_server enforces its own per-upload cap on top.
    client_max_body_size 200M;
    client_body_timeout  120s;

    # SSE / long-lived job-status streams.
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_buffering     off;
    proxy_request_buffering off;

    # FastAPI is behind nginx; pass the original scheme/IP through so
    # `--proxy-headers --forwarded-allow-ips=127.0.0.1` on uvicorn
    # uses them. Don't omit X-Forwarded-Proto — Supabase callbacks
    # need https URLs.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CORS preflights are handled by FastAPI's CORSMiddleware (see
    # FENCE_CORS_ORIGINS in fence-api-v2.env). nginx just passes them
    # through.
    location / {
        proxy_pass         http://fence_api_v2;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # Larger limit for the SSE endpoint so the buffer doesn't drop
    # events under load.
    location ^~ /api/jobs/ {
        proxy_pass         http://fence_api_v2;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
    }

    access_log /var/log/nginx/fence-api-v2.access.log;
    error_log  /var/log/nginx/fence-api-v2.error.log;
}
